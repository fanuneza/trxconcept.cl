<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="base.css" />
    <style>
      .v5 {
        display: grid;
        grid-template-columns: 470px 1fr;
        align-items: center;
        gap: 56px;
        padding: 0 64px 0 60px;
        background:
          radial-gradient(90% 80% at -6% 50%, rgba(249, 254, 5, 0.1) 0%, rgba(249, 254, 5, 0) 46%), var(--bg);
      }
      /* Portrait uses the site's own testimonial-avatar treatment: an accent
         ring with a soft accent halo — the human/trust cue, scaled up. */
      .v5 .portrait {
        justify-self: center;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        overflow: hidden;
        border: 4px solid var(--accent);
        box-shadow: 0 0 0 14px rgba(249, 254, 5, 0.1);
      }
      .v5 .portrait img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .v5 .body {
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .v5 .eyebrow {
        font-size: 23px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: var(--accent);
      }
      .v5 h1 {
        font-size: 96px;
        color: var(--text);
      }
      .v5 .ticks {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .v5 .foot {
        display: flex;
        align-items: center;
        gap: 18px;
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div class="canvas v5">
      <div class="portrait"><img src="nico.png" alt="" /></div>
      <div class="body">
        <div class="brand" style="margin-bottom: 4px">
          <img src="logo-yellow.png" alt="" style="height: 44px" /><span class="wm" style="font-size: 26px">TRX Concept</span>
        </div>
        <h1 class="bebas">Entrena con Nico</h1>
        <div class="ticks">
          <div class="tick"><b>✓</b> Entrenador certificado TRX</div>
          <div class="tick"><b>✓</b> Clases 1 a 1 en Santiago</div>
        </div>
        <div class="foot">
          <span class="chip">Evaluación gratis</span>
          <span class="url">trxconcept.cl</span>
        </div>
      </div>
    </div>
  </body>
</html>
