<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="base.css" />
    <style>
      .v1 .photo {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center 58%;
      }
      /* Diagonal scrim: heavy at the lower-left where the copy lives, opening up
         toward the top-right so the photograph still breathes. */
      .v1 .scrim {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(103deg, rgba(10, 10, 10, 0.94) 0%, rgba(10, 10, 10, 0.7) 40%, rgba(10, 10, 10, 0.1) 82%),
          linear-gradient(0deg, rgba(10, 10, 10, 0.85) 0%, rgba(10, 10, 10, 0) 45%);
      }
      .v1 .inner {
        position: absolute;
        inset: 0;
        padding: 60px 64px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .v1 .head .kick {
        font-size: 24px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 0.02em;
        margin-bottom: 14px;
      }
      .v1 h1 {
        font-size: 104px;
        max-width: 15ch;
        color: var(--text);
        text-wrap: balance;
      }
      .v1 h1 span {
        color: var(--accent);
      }
      .v1 .sub {
        margin-top: 20px;
        font-size: 30px;
        font-weight: 400;
        color: var(--text);
        letter-spacing: 0.005em;
      }
      .v1 .foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
    </style>
  </head>
  <body>
    <div class="canvas v1">
      <img class="photo" src="photo-training.jpg" alt="" />
      <div class="scrim"></div>
      <div class="inner">
        <div class="brand"><img src="logo-yellow.png" alt="" /><span class="wm">TRX Concept</span></div>
        <div class="head">
          <h1 class="bebas">Clases de TRX en <span>Santiago</span></h1>
          <p class="sub">Entrenamiento 1 a 1, a domicilio o al aire libre.</p>
        </div>
        <div class="foot">
          <span class="chip">Evaluación inicial gratis</span>
          <span class="url">trxconcept.cl</span>
        </div>
      </div>
    </div>
  </body>
</html>
